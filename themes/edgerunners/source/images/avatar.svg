<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="hair" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff2a6d"/>
      <stop offset="100%" style="stop-color:#d61f5b"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bg)"/>
  <!-- Cyberpunk-style avatar silhouette -->
  <circle cx="100" cy="85" r="40" fill="#2a2a4a"/>
  <ellipse cx="100" cy="160" rx="55" ry="45" fill="#2a2a4a"/>
  <!-- Neon outline -->
  <circle cx="100" cy="85" r="42" fill="none" stroke="#ff2a6d" stroke-width="2" opacity="0.8"/>
  <!-- Eyes -->
  <ellipse cx="88" cy="80" rx="5" ry="3" fill="#05d9e8"/>
  <ellipse cx="112" cy="80" rx="5" ry="3" fill="#05d9e8"/>
  <!-- Hair streak -->
  <path d="M60 65 Q80 40 100 50 Q120 40 140 65" fill="url(#hair)" opacity="0.9"/>
  <!-- Circuit lines -->
  <line x1="20" y1="180" x2="50" y2="150" stroke="#05d9e8" stroke-width="1" opacity="0.4"/>
  <line x1="180" y1="180" x2="150" y2="150" stroke="#05d9e8" stroke-width="1" opacity="0.4"/>
  <circle cx="50" cy="150" r="2" fill="#05d9e8" opacity="0.6"/>
  <circle cx="150" cy="150" r="2" fill="#05d9e8" opacity="0.6"/>
</svg>
