# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html

# Site
title: Night City Terminal
subtitle: 'Run the Edge'
description: '赛博朋克风格个人博客 — 欢迎来到夜之城'
keywords:
  - cyberpunk
  - edgerunners
  - blog
  - 赛博朋克
  - 边缘行者
  - 夜之城
author: Suko
language: zh-CN
timezone: 'Asia/Shanghai'

# URL
url: https://laozidabo.github.io/suko-mublog
root: /suko-mublog/
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Extensions
theme: edgerunners

# Search
search:
  path: search.json
  field: post
  content: true
  format: striptags

# Deployment
deploy:
  type: ''
